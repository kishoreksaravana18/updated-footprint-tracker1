# Netlify configuration for YourInfo X
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Route /api/* to serverless functions BEFORE the SPA fallback
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — must be last, catches everything else
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
